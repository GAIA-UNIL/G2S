name: Build & Upload G2S to TestPyPI

on:
  workflow_dispatch:
  push:
    paths:
      - 'src_interfaces/**'
      - 'include_interfaces/**'
      - 'build/python-build/**'
      - '.github/workflows/pythonPublishTest.yml'

jobs:
  build-sdist:
    name: 📦 Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: |
          pip install --upgrade pip build twine
          cd build
          make python-sdist
          cd python-build
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*.tar.gz --skip-existing --verbose
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}

  build-linux:
    name: 🐧 Linux wheels (manylinux)
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - python: 3.15-dev
            experimental: true
      fail-fast: false
    env:
      PIP_PRE: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          check-latest: ${{ matrix.experimental == true }}
      - name: Build inside manylinux
        run: |
          PYTHON_SERIES="${{ matrix.python }}"
          PYTHON_SERIES="${PYTHON_SERIES%%-*}"
          PYVER=$(echo "$PYTHON_SERIES" | tr -d .)
          PYTAG="cp${PYVER}-cp${PYVER}"
          echo "🧱 Building for $PYTAG using manylinux_2_28"

          docker run --rm -e PIP_PRE -v "$PWD:/io" quay.io/pypa/manylinux_2_28_x86_64 bash -c "
            set -e
            echo '🐍 Installing build dependencies...'
            /opt/python/${PYTAG}/bin/python -m pip install --upgrade pip build wheel numpy pyzmq twine auditwheel

            echo '🏗️  Building wheel...'
            cd /io/build
            make PYTHON=/opt/python/${PYTAG}/bin/python python-wheel

            echo '🧩 Running auditwheel repair...'
            cd /io/build/python-build/dist
            auditwheel repair *.whl -w .
            rm -f *linux_x86_64.whl

            echo '✅ Listing final wheels:'
            ls -lh
          "
      - name: Test import
        run: |
          pip install build/python-build/dist/*.whl
          python -c "import g2s; print('✅ g2s import OK')"
      - name: Upload to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          cd build/python-build
          python -m pip install --upgrade twine
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*.whl --skip-existing --verbose

  build-macos:
    name: 🍎 macOS wheels
    runs-on: macos-latest
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - python: 3.15-dev
            experimental: true
      fail-fast: false
    env:
      ARCHFLAGS: -arch arm64
      MACOSX_DEPLOYMENT_TARGET: "11.0"
      PIP_PRE: ${{ matrix.experimental == true }}
      _PYTHON_HOST_PLATFORM: macosx-11.0-arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          check-latest: ${{ matrix.experimental == true }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip build wheel numpy pyzmq twine
      - name: Build wheel
        run: |
          cd build
          make python-wheel
      - name: Test import
        run: |
          pip install build/python-build/dist/*.whl
          python -c "import g2s; print('✅ g2s import OK')"
      - name: Upload to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          cd build/python-build
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*.whl --skip-existing --verbose

  build-windows:
    name: 🪟 Windows wheels
    runs-on: windows-latest
    continue-on-error: ${{ matrix.experimental == true }}
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - python: 3.15-dev
            experimental: true
      fail-fast: false
    env:
      PIP_PRE: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          check-latest: ${{ matrix.experimental == true }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build wheel numpy pyzmq twine
      - name: Install Windows dependencies
        run: |
          cd build/python-build
          cmd.exe /c setup_Win_compile_all.bat
      - name: Install GNU Make
        run: choco install make --no-progress -y
      - name: Build wheel
        shell: bash
        run: |
          make -C build/python-build PYTHON=python wheel
      - name: Test import
        shell: pwsh
        run: |
          $wheel = Get-ChildItem build/python-build/dist/*.whl | Select-Object -First 1
          Write-Host "Installing wheel: $($wheel.FullName)"
          pip install "$($wheel.FullName)"
          python -c "import g2s; print('g2s import OK')"
      - name: Upload to TestPyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_TOKEN }}
        run: |
          cd build/python-build
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*.whl --skip-existing --verbose
